# Build APK Android di CI — alternatif reproducible dari WSL2 (plan Fase 6).
# APK debug tersedia sebagai artifact "teledrive-apk" di halaman run.
name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - "mobile/**"
      - "core/**"
      - "config/**"
      - ".github/workflows/android.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependensi sistem p4a
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf automake \
            libtool libtool-bin libltdl-dev m4 pkg-config zlib1g-dev \
            libncurses-dev cmake libffi-dev libssl-dev librsvg2-bin imagemagick

      # p4a masih paling stabil dengan Cython 0.29.x
      - name: Instal buildozer
        run: pip install buildozer cython==0.29.36

      # Opsional: tanam kredensial API ke APK dari repo secrets.
      # Repo ini PUBLIK — artifact bisa diunduh siapa saja, jadi secrets
      # sengaja belum diset; app meminta api_id/api_hash sekali di UI.
      - name: Tulis apicreds.py (kalau secrets ada)
        env:
          API_ID: ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          if [ -n "$API_ID" ] && [ -n "$API_HASH" ]; then
            printf 'API_ID = %s\nAPI_HASH = "%s"\n' "$API_ID" "$API_HASH" > mobile/apicreds.py
            echo "apicreds.py ditulis dari secrets"
          else
            echo "secrets tidak ada — app akan minta kredensial di UI"
          fi

      # core/ + config/ di-share dengan desktop — sumber tunggal di root
      # repo, disalin ke source.dir buildozer saat build (gitignored)
      - name: Salin core/ + config/ dan generate icon
        run: |
          rm -rf mobile/core mobile/config
          cp -r core config mobile/
          mkdir -p mobile/data
          rsvg-convert -w 512 -h 512 teledrive.svg -o mobile/data/icon.png
          # Adaptive icon: safe zone launcher = LINGKARAN diameter 66%
          # (338px di kanvas 512). Logo persegi harus muat DI DALAM
          # lingkaran itu: sisi maks = 338/√2 ≈ 239px — pakai 220px
          # (300px kemarin masih terpotong sudutnya)
          rsvg-convert -w 220 -h 220 teledrive.svg -o /tmp/logofg.png
          convert /tmp/logofg.png -background none -gravity center \
            -extent 512x512 mobile/data/icon_fg.png
          convert -size 512x512 xc:"#101720" mobile/data/icon_bg.png

      # Keystore debug persisten antar build — tanpa ini tiap run bikin
      # key baru dan APK tidak bisa install-timpa (signature mismatch)
      - name: Cache debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Generate debug keystore kalau belum ada
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore \
              -storepass android -keypass android -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Cache SDK/NDK Android
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            mobile/.buildozer
          key: buildozer-${{ hashFiles('mobile/buildozer.spec') }}

      - name: Build APK debug
        working-directory: mobile
        # `yes |` menjawab prompt lisensi Android SDK yang interaktif
        run: yes | buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: teledrive-apk
          path: mobile/bin/*.apk
          if-no-files-found: error
